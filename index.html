<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YT-DLP Desktop</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <!-- Google Fonts for typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div class="layout-container">
        <!-- LEFT COLUMN: Main Downloader -->
        <main class="main-content">
          <div class="glass-card">
            <header class="card-header">
              <h1>YT-DLP <span>Studio</span></h1>
              <p>The premium client to download everything you need.</p>
            </header>

            <form id="download-form">
              <div class="input-group">
                <div style="display: flex; gap: 0.5rem; width: 100%;">
                  <input 
                    id="url-input" 
                    type="text" 
                    placeholder="Paste Youtube or any Supported URL..." 
                    autocomplete="off"
                    required 
                    style="flex: 1;"
                  />
                  <button type="button" id="fetch-formats-btn" style="padding: 0 1.5rem; border-radius: 12px; border: none; background: rgba(255, 0, 0, 0.2); color: #ff6b6b; font-weight: 700; cursor: pointer; transition: all 0.3s ease; white-space: nowrap;">
                    Fetch Info
                  </button>
                </div>
                <input 
                  id="playlist-items-input" 
                  type="text" 
                  placeholder="Playlist index range (e.g. 1:5) [Optional]" 
                  class="optional-input"
                />
              </div>

              <div id="preview-container" class="hidden" style="margin-top: 1rem; margin-bottom: 1.5rem; display: flex; gap: 1rem; padding: 1rem; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 12px; animation: slideUp 0.3s ease;">
                <div id="preview-thumbnail" style="width: 120px; height: 68px; border-radius: 8px; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;"></div>
                <div style="flex: 1; min-width: 0;">
                  <h3 id="preview-title" style="font-size: 0.95rem; margin-bottom: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary);"></h3>
                  <div style="display: flex; gap: 0.8rem; align-items: center;">
                     <span id="preview-duration" style="font-size: 0.85rem; color: #ff6b6b; font-weight: 600; background: rgba(255, 107, 107, 0.1); padding: 0.1rem 0.5rem; border-radius: 4px;"></span>
                     <span id="preview-uploader" style="font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></span>
                  </div>
                </div>
              </div>

              <div class="options-group">
                <div class="format-category">
                  <label class="radio-label">
                    <input type="radio" name="format" value="video" checked>
                    <div class="radio-btn">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
                      <span>Video</span>
                    </div>
                  </label>
                  <select id="video-format" class="format-select">
                    <option value="bestvideo+bestaudio/best|mp4">MP4</option>
                    <option value="bestvideo+bestaudio/best|mkv">MKV</option>
                    <option value="bestvideo+bestaudio/best|webm">WEBM</option>
                  </select>
                </div>
                
                <div class="format-category">
                  <label class="radio-label">
                    <input type="radio" name="format" value="audio">
                    <div class="radio-btn">
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                      <span>Audio</span>
                    </div>
                  </label>
                  <select id="audio-format" class="format-select hidden">
                    <option value="bestaudio/best|mp3">MP3</option>
                    <option value="bestaudio/best|m4a">M4A</option>
                    <option value="bestaudio/best|wav">WAV</option>
                    <option value="bestaudio/best|flac">FLAC</option>
                    <option value="bestaudio/best|aac">AAC</option>
                  </select>
                </div>
              </div>

              <div class="preferences-group">
                <div class="pref-row" style="display: flex; flex-direction: column; gap: 0.5rem;">
                  <div style="display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); font-size: 0.95rem;">
                    <span>Default Download Directory</span>
                    <button type="button" id="select-download-dir-btn" style="padding: 0.3rem 0.8rem; border-radius: 8px; border: 1px solid var(--card-border); background: rgba(255, 255, 255, 0.05); color: var(--text-primary); cursor: pointer; font-size: 0.85rem; font-weight: 600; font-family: inherit; transition: all 0.2s ease;">
                      Change Folder
                    </button>
                  </div>
                  <div id="download-dir-display" style="font-size: 0.85rem; color: rgba(255,255,255,0.5); word-break: break-all; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 8px; border: 1px solid var(--card-border);">
                    System Defaults
                  </div>
                </div>
                <div class="pref-row" style="margin-top: 1rem;">
                  <label class="switch-label">
                    <span>Remove SponsorBlock Segments (Skip Ads)</span>
                    <div class="switch">
                      <input type="checkbox" id="sponsorblock-toggle" checked>
                      <span class="slider"></span>
                    </div>
                  </label>
                </div>
                <div class="pref-row" style="margin-top: 1rem;">
                  <label class="switch-label">
                    <span>Embed Metadata & Subtitles (Better Players)</span>
                    <div class="switch">
                      <input type="checkbox" id="metadata-toggle" checked>
                      <span class="slider"></span>
                    </div>
                  </label>
                </div>
                <div class="pref-row" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem;">
                  <div style="display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); font-size: 0.95rem;">
                    <span>Concurrent Downloads (Speed Boost)</span>
                    <span id="concurrent-downloads-val" style="font-weight: 600; color: var(--text-primary); background: rgba(255,255,255,0.1); padding: 0.2rem 0.6rem; border-radius: 8px;">3 Threads</span>
                  </div>
                  <input type="range" id="concurrent-downloads-slider" min="1" max="10" value="3" style="width: 100%; cursor: pointer;">
                </div>
                <div class="pref-row" style="margin-top: 1.5rem;">
                  <label style="display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); font-size: 0.95rem; width: 100%;">
                    <span>Cookies (Auth Bypass)</span>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                      <button type="button" id="select-cookies-btn" style="padding: 0.5rem 1rem; border-radius: 12px; border: 1px solid var(--card-border); background: rgba(0, 0, 0, 0.2); color: var(--text-primary); cursor: pointer; font-size: 0.95rem; font-weight: 600; font-family: inherit; transition: all 0.3s ease;">
                        📄 File
                      </button>
                      <select id="browser-select" class="format-select" style="width: 140px; padding: 0.5rem 1rem;">
                        <option value="" selected>No Cookies</option>
                        <option value="all">Auto Detect</option>
                        <option value="chrome">Chrome</option>
                        <option value="firefox">Firefox</option>
                        <option value="edge">Edge</option>
                        <option value="brave">Brave</option>
                        <option value="opera">Opera</option>
                        <option value="vivaldi">Vivaldi</option>
                      </select>
                    </div>
                  </label>
                </div>
              </div>

              <button type="submit" id="download-btn">
                Download Now
              </button>
            </form>

            <div id="progress-container" class="hidden">
              <div class="status-text">
                <span id="status-msg">Waiting to start...</span>
                <span id="status-perc">0%</span>
              </div>
              <div class="progress-bar-bg">
                <div id="progress-bar-fill"></div>
              </div>
            </div>
          </div>
        </main>

        <!-- RIGHT COLUMN: History Sidebar -->
        <aside class="sidebar">
          <div id="history-container" class="glass-card history-card">
            <div class="history-header">
              <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 1rem;">
                <h3>Recent Downloads</h3>
                <button type="button" id="clear-history-btn" class="clear-btn">Clear All</button>
              </div>
              
              <!-- History Filters -->
              <div class="history-filters" style="display: flex; gap: 0.5rem; width: 100%;">
                <select id="history-type-filter" class="format-select" style="padding: 0.5rem; font-size: 0.85rem; flex: 1;">
                  <option value="all">All Types</option>
                  <option value="video">Video</option>
                  <option value="audio">Audio</option>
                </select>
                <select id="history-date-filter" class="format-select" style="padding: 0.5rem; font-size: 0.85rem; flex: 1.5;">
                  <option value="all">All Time</option>
                  <option value="today">Today</option>
                  <option value="week">Past 7 Days</option>
                  <option value="older">Older</option>
                </select>
              </div>
            </div>
            
            <div id="history-list" class="history-list">
              <!-- Download items populated via TS -->
              <div style="text-align: center; color: var(--text-secondary); padding: 2rem 0; font-size: 0.9rem;">
                No downloads yet
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
